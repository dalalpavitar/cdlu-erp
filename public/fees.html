<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Fees | CDLU ERP</title><link rel="icon" href="images/favicon.ico"><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"><link rel="stylesheet" href="css/style.css">
<style>
.fee-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin:20px 0;}
.fee-stat{background:var(--white);padding:20px;border-radius:var(--radius);box-shadow:var(--shadow);border-left:4px solid var(--saffron);}
.fee-stat h4{font-size:0.82rem;color:var(--text-light);margin-bottom:5px;}
.fee-stat .num{font-size:1.6rem;font-weight:700;color:var(--navy);}
.fee-stat .num.green{color:var(--green);}.fee-stat .num.red{color:#c62828;}
</style></head>
<body><div class="top-bar"><div class="container"><div class="top-bar-left"><span>श्रद्धावान लभते ज्ञानं</span></div><div class="top-bar-right"><span id="userInfo" style="margin-right:15px;"></span><a href="logout.html">Logout</a></div></div></div>
<header class="header"><div class="container"><a href="index.html" class="logo"><img src="images/cdlu-logo.png" alt="CDLU"><div class="logo-text"><h1>CDLU ERP Portal</h1><span>Integrated University Management System</span></div></a></div></header>
<div class="erp-layout"><div class="erp-sidebar"><h3>Main Menu</h3><ul class="erp-nav"><li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li><li><a href="attendance.html"><i class="fas fa-calendar-check"></i> Attendance</a></li><li><a href="fees.html" class="active"><i class="fas fa-money-bill"></i> Fees</a></li><li><a href="results-entry.html"><i class="fas fa-file-lines"></i> Results</a></li><li><a href="timetable.html"><i class="fas fa-table"></i> Timetable</a></li><li><a href="notices-erp.html"><i class="fas fa-bullhorn"></i> Notices</a></li><li><a href="admin.html"><i class="fas fa-cogs"></i> Admin</a></li><li><a href="index.html"><i class="fas fa-globe"></i> Back to Site</a></li></ul></div>
<div class="erp-content"><h1>Fee Management</h1>
<div id="feeSearch" class="form-row" style="align-items:end;"><div class="form-group" style="flex:1;"><label>Student Registration ID</label><input type="text" id="feeRegId" class="form-control" placeholder="Enter Registration Number (e.g. CDLU2025001)"></div><div><button class="btn btn-primary" onclick="viewFees()"><i class="fas fa-search"></i> View Fee Details</button></div></div>
<div id="feeMsg"></div>
<div id="feeSummary" style="display:none;"></div>
<div id="feeTable" style="display:none;margin-top:20px;"></div>
</div></div>
<footer class="footer"><div class="container"><div class="footer-bottom"><span>&copy; 2026 CDLU ERP Portal</span></div></div></footer>
<script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/script.js"></script>
<script>
function showFeeMsg(m,t){var el=document.getElementById('feeMsg');el.innerHTML='<div class="alert alert-'+(t||'info')+'">'+m+'</div>';setTimeout(function(){el.innerHTML='';},5000);}

async function viewFees(){
  var regId=document.getElementById('feeRegId').value.trim();
  if(!regId){showFeeMsg('Please enter a Student Registration ID.','warning');return;}
  var summaryEl=document.getElementById('feeSummary');
  var tableEl=document.getElementById('feeTable');
  summaryEl.style.display='none';
  tableEl.style.display='none';
  try{
    var fees=await API.get('/fees?regId='+encodeURIComponent(regId));
    if(!fees||fees.length===0){
      showFeeMsg('No fee records found for <strong>'+regId+'</strong>.','info');
      return;
    }
    var totalFees=0, totalPaid=0, totalDue=0;
    var rows='<table class="admin-table"><tr><th>Semester</th><th>Total Fees</th><th>Paid Amount</th><th>Due</th><th>Status</th><th>Due Date</th></tr>';
    fees.forEach(function(f){
      var due=(f.total_fees-f.paid_amount);
      totalFees+=parseFloat(f.total_fees);totalPaid+=parseFloat(f.paid_amount);totalDue+=due;
      var badge=f.status==='paid'?'success':(f.status==='partial'?'warning':'danger');
      rows+='<tr><td>Semester '+f.semester+'</td><td>₹'+parseFloat(f.total_fees).toLocaleString()+'</td><td>₹'+parseFloat(f.paid_amount).toLocaleString()+'</td><td>₹'+due.toLocaleString()+'</td><td><span class="badge badge-'+badge+'">'+f.status.toUpperCase()+'</span></td><td>'+(f.due_date?f.due_date.slice(0,10):'-')+'</td></tr>';
    });
    rows+='</table>';
    summaryEl.style.display='block';
    summaryEl.innerHTML='<div class="fee-summary"><div class="fee-stat"><h4>Total Fees</h4><div class="num">₹'+totalFees.toLocaleString()+'</div></div><div class="fee-stat"><h4>Total Paid</h4><div class="num green">₹'+totalPaid.toLocaleString()+'</div></div><div class="fee-stat"><h4>Total Due</h4><div class="num '+(totalDue>0?'red':'green')+'">₹'+totalDue.toLocaleString()+'</div></div><div class="fee-stat"><h4>Student</h4><div style="font-size:0.95rem;color:var(--navy);font-weight:600;">'+fees[0].student_name+'</div><div style="font-size:0.8rem;color:var(--text-light);">'+regId+'</div></div></div>';
    tableEl.style.display='block';
    tableEl.innerHTML=rows;
  }catch(e){
    showFeeMsg('Error loading fee details: '+(e.error||e.message||'Unknown'),'danger');
  }
}

document.addEventListener('DOMContentLoaded',function(){
  var user=requireAuth(['admin','teacher','student']);
  if(!user)return;
  var el=document.getElementById('userInfo');
  if(el)el.innerHTML='<i class="fas fa-user"></i> '+(user.name||user.role||'User');
  document.getElementById('feeRegId').addEventListener('keyup',function(e){if(e.key==='Enter')viewFees();});
  if(user.role==='student'&&user.regId){
    document.getElementById('feeRegId').value=user.regId;
    document.getElementById('feeSearch').style.display='none';
    viewFees();
  } else {
    var params=new URLSearchParams(window.location.search);
    if(params.get('regId')){document.getElementById('feeRegId').value=params.get('regId');viewFees();}
  }
});
</script>
</body></html>
