<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | CDLU ERP</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
    .dashboard-header h1 { font-size: 1.5rem; color: var(--navy); margin: 0; }
    .dashboard-user { display: flex; align-items: center; gap: 10px; }
    .dashboard-user span { font-weight: 600; color: var(--navy); }
    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .dash-card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; transition: 0.3s; }
    .dash-card:hover { transform: translateY(-3px); box-shadow: 0 4px 15px rgba(0,0,0,0.12); }
    .dash-card .num { font-size: 2rem; font-weight: 700; color: var(--saffron); display: block; }
    .dash-card .label { font-size: 0.9rem; color: #666; margin-top: 5px; display: block; }
    .dash-card .icon { font-size: 2rem; display: block; margin-bottom: 10px; }
    .dash-modules { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
    .dash-module { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #eee; }
    .dash-module:hover { border-color: var(--saffron); box-shadow: 0 2px 10px rgba(255,153,51,0.2); }
    .dash-module .icon { font-size: 1.8rem; display: block; margin-bottom: 8px; }
    .dash-module .name { font-weight: 600; color: var(--navy); }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="container">
      <span>Shraddhavan Labhate Gyanam | श्रद्धावान लभते ज्ञानं</span>
      <span><a href="index.html">Back to Website</a> | <a href="#" onclick="logout()">Logout</a></span>
    </div>
  </div>
  <header class="header">
    <div class="container">
      <a href="index.html" class="logo">
        <div class="logo-icon">CDLU</div>
        <div class="logo-text">
          <h1>Chaudhary Devi Lal University</h1>
          <span>ERP Dashboard</span>
        </div>
      </a>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <div class="dashboard-header">
        <h1>Welcome, <span id="userName">User</span></h1>
        <div class="dashboard-user">
          <span class="badge" id="userRole" style="background:var(--saffron);color:white;padding:5px 12px;border-radius:20px;font-size:12px;">Admin</span>
        </div>
      </div>

      <div class="dashboard-grid" id="statsGrid">
        <div class="dash-card"><span class="num" id="statStudents">0</span><span class="label">Students</span></div>
        <div class="dash-card"><span class="num" id="statTeachers">0</span><span class="label">Teachers</span></div>
        <div class="dash-card"><span class="num" id="statCourses">0</span><span class="label">Courses</span></div>
        <div class="dash-card"><span class="num" id="statFees">₹0</span><span class="label">Fees Collected</span></div>
      </div>

      <h3 style="color:var(--navy);margin-bottom:15px">Modules</h3>
      <div class="dash-modules" id="modulesGrid"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Chaudhary Devi Lal University, Sirsa. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script>
    function logout() {
      localStorage.removeItem('cdluToken');
      localStorage.removeItem('cdluRole');
      localStorage.removeItem('cdluName');
      window.location.href = 'login.html';
    }

    var modules = {
      admin: [
        { name: 'Students', icon: '👨‍🎓', url: 'admin.html' },
        { name: 'Teachers', icon: '👨‍🏫', url: '#' },
        { name: 'Courses', icon: '📚', url: '#' },
        { name: 'Attendance', icon: '✅', url: 'attendance.html' },
        { name: 'Fees', icon: '💰', url: 'fees.html' },
        { name: 'Results', icon: '📊', url: 'results.html' },
        { name: 'Notices', icon: '📢', url: 'notices.html' },
        { name: 'Timetable', icon: '📅', url: 'timetable.html' },
        { name: 'Registration', icon: '📝', url: 'registration.html' }
      ],
      teacher: [
        { name: 'My Classes', icon: '👨‍🏫', url: '#' },
        { name: 'Attendance', icon: '✅', url: 'attendance.html' },
        { name: 'Enter Marks', icon: '📊', url: 'results.html' },
        { name: 'Notices', icon: '📢', url: 'notices.html' },
        { name: 'Timetable', icon: '📅', url: 'timetable.html' }
      ],
      student: [
        { name: 'My Attendance', icon: '✅', url: '#' },
        { name: 'My Fees', icon: '💰', url: '#' },
        { name: 'My Results', icon: '📊', url: '#' },
        { name: 'Notices', icon: '📢', url: 'notices.html' },
        { name: 'Timetable', icon: '📅', url: 'timetable.html' }
      ]
    };

    document.addEventListener('DOMContentLoaded', async function () {
      var token = localStorage.getItem('cdluToken');
      var role = localStorage.getItem('cdluRole');
      var name = localStorage.getItem('cdluName');
      if (!token) { window.location.href = 'login.html'; return; }

      document.getElementById('userName').textContent = name || 'User';
      document.getElementById('userRole').textContent = role || 'Guest';

      try {
        var stats = await API.get('/dashboard/stats');
        document.getElementById('statStudents').textContent = stats.students || 0;
        document.getElementById('statTeachers').textContent = stats.teachers || 0;
        document.getElementById('statCourses').textContent = stats.courses || 0;
        document.getElementById('statFees').textContent = '₹' + (stats.feesCollected || 0).toLocaleString();
      } catch (e) { console.warn('Stats not available'); }

      var mods = modules[role] || modules.admin;
      var grid = document.getElementById('modulesGrid');
      mods.forEach(function(m) {
        var el = document.createElement('a');
        el.href = m.url;
        el.className = 'dash-module';
        el.innerHTML = '<span class="icon">' + m.icon + '</span><span class="name">' + m.name + '</span>';
        grid.appendChild(el);
      });
    });
  </script>
</body>
</html>
