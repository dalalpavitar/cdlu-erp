<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Login | CDLU Sirsa</title>
<link rel="icon" href="images/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<style>.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy),var(--navy-dark));padding:20px;}.login-box{background:var(--white);border-radius:var(--radius-lg);padding:40px;width:100%;max-width:420px;box-shadow:var(--shadow-lg);}.login-box .logo{justify-content:center;margin-bottom:25px;}.login-box h2{text-align:center;margin-bottom:5px;}.login-box p{text-align:center;color:var(--text-light);font-size:0.85rem;margin-bottom:25px;}.role-tabs{display:flex;gap:8px;margin-bottom:20px;}.role-tab{flex:1;padding:10px;border:2px solid var(--border);border-radius:var(--radius);text-align:center;cursor:pointer;font-size:0.82rem;font-weight:600;color:var(--text-light);transition:all var(--transition);background:var(--white);}.role-tab.active,.role-tab:hover{border-color:var(--saffron);color:var(--navy);background:var(--saffron-light);}.login-error{color:#c62828;font-size:0.85rem;text-align:center;margin-bottom:10px;display:none;}.login-footer{text-align:center;margin-top:20px;font-size:0.82rem;color:var(--text-light);}.login-footer a{color:var(--saffron);font-weight:600;}</style>
</head>
<body>
<div class="login-page">
<div class="login-box">
<div class="logo" style="display:flex;align-items:center;gap:10px;"><img src="images/cdlu-logo.png" alt="CDLU" style="height:50px;"><div class="logo-text"><h1 style="font-size:1rem;">Chaudhary Devi Lal University</h1><span style="font-size:0.65rem;">ERP Portal</span></div></div>
<h2>Welcome Back</h2><p>Sign in to your account</p>
<div class="role-tabs"><button class="role-tab active" data-role="student">Student</button><button class="role-tab" data-role="teacher">Teacher</button><button class="role-tab" data-role="admin">Admin</button></div>
<div id="loginError" class="login-error"></div>
<form id="loginForm">
<div id="studentFields"><div class="form-group"><label>Registration ID</label><input type="text" id="studentId" class="form-input" placeholder="e.g. CDLU2025001"></div><div class="form-group"><label>Date of Birth</label><input type="date" id="studentDob" class="form-input"></div></div>
<div id="teacherFields" style="display:none;"><div class="form-group"><label>Email</label><input type="email" id="teacherEmail" class="form-input" placeholder="teacher@cdlu.ac.in"></div><div class="form-group"><label>Password</label><input type="password" id="teacherPassword" class="form-input" placeholder="Enter password"></div></div>
<div id="adminFields" style="display:none;"><div class="form-group"><label>Admin Password</label><input type="password" id="adminPass" class="form-input" placeholder="Enter admin password"></div></div>
<button type="submit" class="btn btn-primary btn-block" style="margin-top:10px;">Sign In <i class="fas fa-arrow-right"></i></button>
</form>
<div class="login-footer">New student? <a href="registration.html">Register here</a></div>
</div>
</div>
<script>
document.addEventListener("DOMContentLoaded",function(){var tabs=document.querySelectorAll(".role-tab"),sf=document.getElementById("studentFields"),tf=document.getElementById("teacherFields"),af=document.getElementById("adminFields");tabs.forEach(function(t){t.addEventListener("click",function(){tabs.forEach(function(x){x.classList.remove("active")});this.classList.add("active");var r=this.getAttribute("data-role");sf.style.display="student"===r?"block":"none";tf.style.display="teacher"===r?"block":"none";af.style.display="admin"===r?"block":"none"})})});
document.getElementById("loginForm").addEventListener("submit",async function(e){e.preventDefault();var r=document.querySelector(".role-tab.active").getAttribute("data-role"),t={role:r};if("student"===r){t.reg_id=document.getElementById("studentId").value;t.dob=document.getElementById("studentDob").value}else if("teacher"===r){t.email=document.getElementById("teacherEmail").value;t.password=document.getElementById("teacherPassword").value}else{t.password=document.getElementById("adminPass").value}try{var n=await fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(t)}),o=await n.json();if(o.token){var u=o.user||{};localStorage.setItem("cdluToken",o.token);localStorage.setItem("cdluRole",u.role||r);localStorage.setItem("cdluName",u.name||'');localStorage.setItem("cdluId",u.id||'');localStorage.setItem("cdluRegId",u.regId||'');window.location.href="dashboard.html"}else{document.getElementById("loginError").textContent=o.error||"Login failed. Please try again.";document.getElementById("loginError").style.display="block"}}catch(a){document.getElementById("loginError").textContent="Connection error. Please try again.";document.getElementById("loginError").style.display="block"}});
</script>
</body>
</html>
